<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Verify Certificate — AGA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav style="background:var(--charcoal);
              padding:1rem 5%;">
    <a href="index.html" style="color:var(--gold);
       text-decoration:none; font-size:1.2rem;">
      ← Asian Gemological Association
    </a>
  </nav>

  <section>
    <h2>Certificate Verification</h2>
    <div class="search-box"
         style="border-color:var(--ruby);
                max-width:550px;">
      <input type="text" id="reportSearch"
        placeholder="Enter Report Number">
      <button onclick="searchCertificate()"
              style="background:var(--ruby);
                     color:white;">
        Verify
      </button>
    </div>

    <div id="certResult"></div>
  </section>

  <script src="js/app.js"></script>
  <script>
    // Auto-search if URL has ?id= parameter
    const params = new URLSearchParams(
      window.location.search
    );
    if (params.get('id')) {
      document.getElementById('reportSearch')
        .value = params.get('id');
      searchCertificate();
    }
  </script>
</body>
</html>
