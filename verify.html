<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>Verify Certificate — AGA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav style="background:#1A1A2E; padding:1rem 5%; display:flex; align-items:center; gap:1rem;">
  <a href="index.html" style="display:flex; align-items:center; gap:0.8rem; text-decoration:none;">
    <img src="logo.png" alt="AGA Logo" style="height:40px;">
    <span style="color:#E8D48B; font-size:1.2rem;">Asian Gemological Association</span>
  </a>
</nav>
  <section>
    <h2>Certificate Verification</h2>
    <div class="search-box"
         style="border-color:var(--ruby);
                max-width:550px;">
      <input type="text" id="reportSearch"
        placeholder="Enter Report Number">
      <button onclick="searchCertificate()"
              style="background:var(--ruby);
                     color:white;">
        Verify
      </button>
    </div>

    <div id="certResult"></div>
  </section>

  <script src="app.js"></script>
  <script>
    var params = new URLSearchParams(
      window.location.search
    );
    if (params.get('id')) {
      document.getElementById('reportSearch')
        .value = params.get('id');
      searchCertificate();
    }
  </script>
</body>
</html>
