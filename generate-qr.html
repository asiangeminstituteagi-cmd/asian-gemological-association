<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AGA — QR Code Generator</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { color: #9B111E; }
    input, button {
      padding: 12px;
      font-size: 1rem;
      font-family: inherit;
    }
    input {
      width: 100%;
      border: 2px solid #C9A84C;
      margin: 1rem 0;
    }
    button {
      background: #9B111E;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    #qrOutput {
      text-align: center;
      margin: 2rem 0;
    }
    #qrOutput canvas {
      border: 8px solid #1A1A2E;
      padding: 12px;
      background: white;
    }
    .print-info {
      text-align: center;
      color: #6B6B6B;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>QR Code Generator</h1>
  <p>Enter the report number to generate
     a QR code for the certificate.</p>

  <input type="text" id="reportInput"
    placeholder="AGA-2026-00001">

  <button onclick="generateQR()">
    Generate QR Code
  </button>

  <div id="qrOutput"></div>
  <p class="print-info">
    Right-click the QR code → Save Image,
    then place it on your printed certificate.
  </p>

  <!-- QR code library (free, open-source) -->
  <script src=
    "https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
  </script>
  <script>
    // IMPORTANT: Replace with YOUR actual site URL
    const SITE_URL =
      'https://yourusername.github.io/asian-gemological-association';

    function generateQR() {
      const reportNo =
        document.getElementById('reportInput')
          .value.trim();
      if (!reportNo) return;

      const container =
        document.getElementById('qrOutput');
      container.innerHTML = '';

      const verifyURL =
        SITE_URL + '/verify.html?id=' +
        encodeURIComponent(reportNo);

      new QRCode(container, {
        text: verifyURL,
        width: 200,
        height: 200,
        colorDark: '#1A1A2E',
        colorLight: '#FFFFFF'
      });

      container.innerHTML +=
        '<p style="margin-top:1rem;">' +
        '<strong>' + reportNo + '</strong>' +
        '<br><small>' + verifyURL +
        '</small></p>';
    }
  </script>
</body>
</html>
